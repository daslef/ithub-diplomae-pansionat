{% extends './base.html' %}
{% block title %}Бронирование{% endblock %}
{% block content %}
<h2 class="text-center mb-4">Забронировать место</h2>

<form method="POST" class="mx-auto" style="max-width: 500px;">
  <div class="mb-3">
    <label class="form-label">Имя:</label>
    <input type="text" class="form-control" name="name" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Телефон:</label>
    <input type="text" class="form-control" name="phone" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Описание (например: “лежачая бабушка 92 года, любит читать книги и смотреть телевизор, каждый вторник пьет малиновый чай с мятой)):</label>
    <textarea class="form-control" name="description" rows="3" required></textarea>
  </div>

  <button type="submit" class="btn btn-success w-100">Отправить заявку</button>
</form>
{% endblock %}
